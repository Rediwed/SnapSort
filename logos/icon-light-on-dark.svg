<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Dark background rounded square -->
  <rect width="512" height="512" rx="96" fill="#111827"/>

  <!-- Photo stack - back card -->
  <g transform="rotate(-15 220 265)" filter="url(#shadow)">
    <rect x="125" y="155" width="190" height="150" rx="14" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="3"/>
  </g>

  <!-- Photo stack - middle card -->
  <g transform="rotate(-5 250 255)" filter="url(#shadow)">
    <rect x="145" y="148" width="190" height="150" rx="14" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
  </g>

  <!-- Photo stack - front card -->
  <g transform="rotate(5 285 240)" filter="url(#shadow)">
    <rect x="168" y="138" width="190" height="150" rx="14" fill="none" stroke="#F9FAFB" stroke-width="3"/>
    <!-- Mountain landscape -->
    <path d="M182 274 L225 218 L252 242 L312 188 L344 274 Z" fill="rgba(255,255,255,0.15)"/>
    <!-- Sun -->
    <circle cx="316" cy="170" r="18" fill="none" stroke="#F9FAFB" stroke-width="2.5"/>
  </g>

  <!-- Sort checkmark badge -->
  <circle cx="385" cy="345" r="40" fill="#F9FAFB"/>
  <path d="M363 345 L378 360 L407 327" fill="none" stroke="#111827" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
