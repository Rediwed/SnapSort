<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="3" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- === ICON (scaled to fit left side) === -->
  <g transform="translate(40, 20) scale(0.7)">
    <!-- Light background rounded square -->
    <rect width="512" height="512" rx="96" fill="#F9FAFB"/>

    <!-- Photo stack - back card -->
    <g transform="rotate(-15 220 265)" filter="url(#shadow)">
      <rect x="125" y="155" width="190" height="150" rx="14" fill="none" stroke="#D1D5DB" stroke-width="3"/>
    </g>

    <!-- Photo stack - middle card -->
    <g transform="rotate(-5 250 255)" filter="url(#shadow)">
      <rect x="145" y="148" width="190" height="150" rx="14" fill="none" stroke="#9CA3AF" stroke-width="3"/>
    </g>

    <!-- Photo stack - front card -->
    <g transform="rotate(5 285 240)" filter="url(#shadow)">
      <rect x="168" y="138" width="190" height="150" rx="14" fill="none" stroke="#1F2937" stroke-width="3"/>
      <path d="M182 274 L225 218 L252 242 L312 188 L344 274 Z" fill="#E5E7EB"/>
      <circle cx="316" cy="170" r="18" fill="none" stroke="#1F2937" stroke-width="2.5"/>
    </g>

    <!-- Sort checkmark badge -->
    <circle cx="385" cy="345" r="40" fill="#1F2937"/>
    <path d="M363 345 L378 360 L407 327" fill="none" stroke="#F9FAFB" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- === WORDMARK === -->
  <text x="460" y="225" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="120" fill="#1F2937">
    <tspan font-weight="800">Snap</tspan><tspan font-weight="400">Sort</tspan>
  </text>

  <!-- Tagline -->
  <text x="463" y="275" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="28" fill="#6B7280" font-weight="400" letter-spacing="2">
    PHOTO ORGANIZER
  </text>
</svg>
