<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#fg)"/>

  <!-- Simplified photo stack for small sizes -->
  <!-- Back card -->
  <g transform="rotate(-12 13.5 16.5)">
    <rect x="7" y="9.5" width="13" height="10.5" rx="1.5" fill="rgba(255,255,255,0.25)"/>
  </g>

  <!-- Front card -->
  <g transform="rotate(5 17.5 15)">
    <rect x="10.5" y="8.5" width="13" height="10.5" rx="1.5" fill="white"/>
    <!-- Mini mountain -->
    <path d="M12 17.5 L15 13.5 L17 15.5 L21 12 L22 17.5 Z" fill="#C7D2FE"/>
  </g>

  <!-- Checkmark badge -->
  <circle cx="24" cy="22" r="5.5" fill="#10B981"/>
  <path d="M21.5 22 L23.2 23.8 L26.5 20.2" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
