version: "3.9"

services:
  snapsort:
    build: .
    container_name: snapsort
    ports:
      - "8080:4000"
    volumes:
      - db-data:/app/backend/data         # persist SQLite database
      - /mnt/user/photos:/mnt/photos      # adjust to your photo share
      # Optional: mount external/unallocated disks (Unraid Unassigned Devices plugin)
      # - /mnt/disks:/mnt/disks
      # Optional: mount all user shares (read-only)
      # - /mnt/user:/mnt/user:ro
    environment:
      - NODE_ENV=production
      - PORT=4000
    restart: unless-stopped

volumes:
  db-data:
