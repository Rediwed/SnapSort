version: "3.9"

services:
  snapsort:
    image: rediwed/snapsort:1.1.0
    build: .
    container_name: snapsort
    ports:
      - "8080:4000"
    volumes:
      - db-data:/app/backend/data         # persist SQLite database
      - /mnt/user/photos:/mnt/photos      # adjust to your photo share
      # Optional: mount external/unallocated disks (Unraid Unassigned Devices plugin)
      # Uses :rslave so drives mounted on the host after start are visible.
      # - /mnt/disks:/mnt/disks:rslave
      # Optional: mount all user shares (read-only)
      # - /mnt/user:/mnt/user:ro,rslave
    environment:
      - NODE_ENV=production
      - PORT=4000
    restart: unless-stopped

volumes:
  db-data:
